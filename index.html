<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Goal Tracker Pro</title>
<style>
:root{--bg:#0F172A;--card:#1E293B;--primary:#2563EB;--text:#fff;--text-dim:#94A3B8}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
body{background:var(--bg);color:var(--text);padding:16px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.btn{background:var(--primary);color:#fff;border:none;padding:12px 20px;border-radius:8px;cursor:pointer;font-weight:600}
.card{background:var(--card);padding:20px;border-radius:12px;margin:12px 0}
input,select,textarea{width:100%;padding:12px;margin:8px 0;background:var(--bg);border:1px solid #334155;border-radius:8px;color:var(--text)}
.goal{border-left:4px solid var(--primary);padding-left:12px;margin:16px 0}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);padding:20px;z-index:999}
.modal.show{display:flex;align-items:center;justify-content:center}
.modal-content{background:var(--card);padding:24px;border-radius:12px;width:100%;max-width:400px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card);padding:12px 24px;border-radius:8px;opacity:0;transition:.3s}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header">
  <h1>🎯 Goal Tracker</h1>
  <button class="btn" onclick="openModal()">+ Add Goal</button>
</div>
<div id="stats"></div>
<div id="goals"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h2>Add Goal</h2>
    <input id="name" placeholder="Goal Name" required>
    <select id="category">
      <option>Study</option><option>Career</option><option>Finance</option><option>Fitness</option><option>Personal</option><option>Business</option>
    </select>
    <select id="priority">
      <option>High</option><option selected>Medium</option><option>Low</option>
    </select>
    <input id="deadline" type="date" required>
    <div style="display:flex;gap:12px;margin-top:16px">
      <button class="btn" style="flex:1;background:#334155" onclick="closeModal()">Cancel</button>
      <button class="btn" style="flex:1" onclick="saveGoal()">Save</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
let goals = JSON.parse(localStorage.getItem('goals')||'[]');
render();

function openModal(){document.getElementById('modal').classList.add('show')}
function closeModal(){document.getElementById('modal').classList.remove('show')}

function saveGoal(){
  const g = {
    id: Date.now(),
    name: document.getElementById('name').value,
    category: document.getElementById('category').value,
    priority: document.getElementById('priority').value,
    deadline: document.getElementById('deadline').value,
    done: false
  };
  if(!g.name || !g.deadline) return toast('Fill all fields');
  goals.push(g);
  localStorage.setItem('goals', JSON.stringify(goals));
  closeModal();
  render();
  toast('Goal added!');
}

function toggleGoal(id){
  goals = goals.map(g=>g.id===id?{...g,done:!g.done}:g);
  localStorage.setItem('goals', JSON.stringify(goals));
  render();
}

function deleteGoal(id){
  goals = goals.filter(g=>g.id!==id);
  localStorage.setItem('goals', JSON.stringify(goals));
  render();
  toast('Deleted');
}

function render(){
  const total = goals.length;
  const done = goals.filter(g=>g.done).length;
  document.getElementById('stats').innerHTML = `
    <div class="card"><h3>Total: ${total}</h3></div>
    <div class="card"><h3>Done: ${done}</h3></div>
  `;
  document.getElementById('goals').innerHTML = goals.map(g=>`
    <div class="card goal">
      <h3>${g.name}</h3>
      <p style="color:var(--text-dim);font-size:14px">${g.category} • ${g.priority} • ${g.deadline}</p>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn" style="flex:1" onclick="toggleGoal(${g.id})">${g.done?'Undo':'Complete'}</button>
        <button class="btn" style="background:#EF4444" onclick="deleteGoal(${g.id})">Delete</button>
      </div>
    </div>
  `).join('') || '<div class="card">No goals yet. Tap + Add Goal</div>';
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
</script>
</body>
</html>
